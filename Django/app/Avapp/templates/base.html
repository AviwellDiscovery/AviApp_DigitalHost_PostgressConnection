<script>
  // Ensure the navbar collapses when a link is clicked
  document.querySelectorAll('.navbar-nav .nav-link').forEach(function(link) {
    link.addEventListener('click', function() {
      const navbarCollapse = document.getElementById('navbarNav');
      const bootstrapCollapse = new bootstrap.Collapse(navbarCollapse, {
        toggle: true
      });
      bootstrapCollapse.hide();  // Close the navbar menu after click
    });
  });
</script>
<script>
  // When a navbar item is clicked, show loading spinner
  document.querySelectorAll('.navbar-nav .nav-link').forEach(function(link) {
    link.addEventListener('click', function() {
      // Show the loading spinner
      document.getElementById('loading-spinner').style.display = 'block';

      // Set the active class with a slight delay to prevent flicker
      setTimeout(function() {
        // Add 'active' class after delay
        document.querySelectorAll('.navbar-nav .nav-item').forEach(function(item) {
          item.classList.remove('active');  // Remove the active class from all items
        });
        link.parentElement.classList.add('active');  // Add active class to the clicked item
      }, 200);  // Delay in ms (200ms is a good starting point)

      // After loading is complete (e.g., after page has been fully loaded), hide the spinner
      window.onload = function() {
        document.getElementById('loading-spinner').style.display = 'none';  // Hide the spinner
      };
    });
  });
</script>
<script>
  // When a navbar item is clicked, show the loading spinner and prevent immediate active state change
  document.querySelectorAll('.navbar-nav .nav-link').forEach(function(link) {
    link.addEventListener('click', function() {
      // Show the loading spinner
      document.getElementById('loading-spinner').style.display = 'block';

      // Prevent active state flicker by waiting for page load
      setTimeout(function() {
        // Remove the 'active' class from all items
        document.querySelectorAll('.navbar-nav .nav-item').forEach(function(item) {
          item.classList.remove('active');
        });

        // Add the 'active' class to the clicked item after page load
        link.parentElement.classList.add('active');
      }, 200);  // Slight delay before setting active class

      // After page load, hide the spinner
      window.onload = function() {
        document.getElementById('loading-spinner').style.display = 'none';
      };
    });
  });
</script>
