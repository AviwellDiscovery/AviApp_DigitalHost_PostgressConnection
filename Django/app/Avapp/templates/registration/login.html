<!DOCTYPE html> <html lang="en">

<meta charset="UTF-8">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body, html {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
    background: #f7f8fb;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-container {
    max-width: 420px;
    width: 100%;
    padding: 30px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(15,23,42,0.1);
    text-align: center;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .login-container:hover {
    transform: scale(1.01);
    box-shadow: 0 8px 20px rgba(15,23,42,0.12);
  }

  .login-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 1rem;
  }

  .login-sub {
    font-size: 0.95rem;
    color: #64748b;
    margin-bottom: 2rem;
  }

  label {
    display: block;
    text-align: left;
    margin-bottom: 6px;
    font-weight: 600;
    color: #334155;
    font-size: 0.95rem;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 12px;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    margin-bottom: 18px;
    font-size: 1rem;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type="text"]:focus,
  input[type="password"]:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(59,130,246,.25);
    outline: none;
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #4ade80, #22c55e); /* same green gradient as Explore Data */
    box-shadow: 0 6px 14px rgba(16, 185, 129, 0.35);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .login-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(16, 185, 129, 0.45);
  }
  .login-btn:active {
    transform: translateY(0);
    box-shadow: 0 5px 12px rgba(16, 185, 129, 0.4) inset;
  }
  .login-btn:focus-visible {
    outline: 3px solid #bbf7d0;
    outline-offset: 3px;
  }

  .error-message {
    color: #dc2626;
    margin-bottom: 1rem;
    font-weight: 600;
  }
</style>

<div class="login-container">
  <h2 class="login-title">Welcome to AviWellApp</h2>
  <p class="login-sub">Please log in to continue </p>

  <form method="post">
    {% csrf_token %}
    {% if error_message %}
      <div class="error-message">{{ error_message }}</div>
    {% endif %}

    <label for="username">Username</label>
    <input type="text" id="username" name="username" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <button type="submit" class="login-btn">Login</button>
  </form>
</div>
