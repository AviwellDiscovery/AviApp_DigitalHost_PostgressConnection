<style>

    .sub-title {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(45deg, #a4c639, #8fcf39);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        margin-bottom: 2rem;
    }
    /* Section Container Cadre */
    .section-container {
        border: 2px solid #a4c639;
        border-radius: 10px;
        padding: 15px;
        background-color: #f9fbe7;
        margin-bottom: 1.5rem;
    }
    /* Section Headers */
    .section-header {
        font-size: 1.75rem;
        font-weight: bold;
        color: #a4c639;
        text-align: center;
        margin-bottom: 1.25rem;
    }
    /* Option Cards */
    .option-card {
        margin-bottom: 1rem;
    }
    .card-img-container {
        position: relative;
    }
    .dp-img {
        filter: grayscale(100%);
        border-radius: 15px;
        border: 2px solid #dee2e6;
        object-fit: cover;
        width: 100%;
        max-height: 200px;
        transition: transform 0.3s ease, filter 0.3s ease;
    }
    .pointer {
        cursor: pointer;
    }
    .dp-img:hover {
        filter: grayscale(0%);
        transform: scale(1.02);
    }
    .overlay-text {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        padding: 5px;
        text-align: center;
        font-size: 1rem;
        border-bottom-left-radius: 15px;
        border-bottom-right-radius: 15px;
    }
    /* Overview Image Styles */
    .styled-img {
        filter: grayscale(100%);
        border-radius: 15px;
        border: 2px solid #dee2e6;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        object-fit: contain;
        max-height: 300px;
        width: 100%;
        transition: all 0.3s ease;
    }
    .styled-img:hover {
        filter: grayscale(0%);
        transform: scale(1.05);
    }
    /* Navigation Back Button */
    .modern-btn {
        font-weight: bold;
        padding: 10px 20px;
        border-radius: 30px;
        transition: background-color 0.3s ease;
    }
    .modern-btn:hover {
        background-color: #343a40;
        color: #fff;
    }
    /* Responsive Adjustments */
    @media (max-width: 768px) {
        .main-title {
            font-size: 2.5rem;
        }
        .sub-title {
            font-size: 1.75rem;
        }
        .section-header {
            font-size: 1.5rem;
        }
    }
</style>
